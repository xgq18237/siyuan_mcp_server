services:
  siyuan-mcp-server:
    build: .
    stdin_open: true
    environment:
      SIYUAN_HOST: ${SIYUAN_HOST:-host.docker.internal}
      SIYUAN_PORT: ${SIYUAN_PORT:-6806}
      SIYUAN_TOKEN: ${SIYUAN_TOKEN}
      SIYUAN_MCP_PROTECT_DESTRUCTIVE: ${SIYUAN_MCP_PROTECT_DESTRUCTIVE:-false}
      SIYUAN_MCP_UPLOAD_ROOTS: /uploads
    volumes:
      - ${SIYUAN_MCP_UPLOAD_DIR:-.}:/uploads:ro
    extra_hosts:
      - host.docker.internal:host-gateway
